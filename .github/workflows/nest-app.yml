# ============================================================
# GitHub Actions CI/CD Pipeline: Deploy Nest App to AWS ECS
# ============================================================
# This workflow automates:
#   1. Provisioning AWS infrastructure with Terraform
#   2. Building, scanning, and pushing a Docker image to ECR
#   3. Creating a new ECS task definition revision
#   4. Restarting the ECS Fargate service
#   5. Testing application health
#   6. Monitoring the deployment
#   7. Rolling back on failure
#   8. Sending Slack notifications
# ============================================================

name: Deploy Nest App to AWS ECS

# --------------------------------------------------------------
# TRIGGER: When should this workflow run?
# --------------------------------------------------------------
on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/nest-app.yml'
      - 'docker/nest-app-cicd/**'
      - 'terraform-module-ecs-cicd/nest-app/**'

permissions:
  id-token: write
  contents: read

# --------------------------------------------------------------
# ENVIRONMENT VARIABLES: Shared across all jobs
# --------------------------------------------------------------
env:
  # AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  # AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  # AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
  AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}
  AWS_REGION: us-east-2
  AWS_ACCOUNT_ID: "198811873315"
  TERRAFORM_ACTION: apply
  PROJECT_NAME: nest
  ENVIRONMENT: dev
  RECORD_NAME: demo
  DOMAIN_NAME: tolaniakintayo.xyz
  GITHUB_USERNAME: tolani-akintayo
  REPOSITORY_NAME: nest-app-code
  SERVICE_PROVIDER_FILE_NAME: AppServiceProvider
  APPLICATION_CODE_FILE_NAME: nest
  RDS_DB_NAME: applicationdb
  RDS_DB_USERNAME: admin
  IMAGE_NAME: nest

jobs:
  #--------------------------------------------------------------
  # JOB 1: Build AWS Infrastructure
  #--------------------------------------------------------------
  deploy_aws_infrastructure:
    name: Build AWS infrastructure
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with: 
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure SSH access for Terraform modules
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.14.6"
          terraform_wrapper: false

      - name: Run Terraform init
        working-directory: ./terraform-module-ecs-cicd/nest-app
        run: terraform init

      - name: Run Terraform plan
        working-directory: ./terraform-module-ecs-cicd/nest-app
        run: |
          terraform plan -no-color 

      - name: Run Terraform apply/destroy
        working-directory: ./terraform-module-ecs-cicd/nest-app
        run: terraform ${TERRAFORM_ACTION} --auto-approve

      - name: Export Terraform outputs
        if: env.TERRAFORM_ACTION == 'apply'
        working-directory: ./terraform-module-ecs-cicd/nest-app
        run: |
          echo "RDS_ENDPOINT=$(terraform output -raw rds_endpoint | cut -d ':' -f1)" >> $GITHUB_ENV
          echo "ECS_TASK_DEFINITION_NAME=$(terraform output -raw ecs_task_definition_name | cut -d ':' -f1)" >> $GITHUB_ENV
          echo "ECS_CLUSTER_NAME=$(terraform output -raw ecs_cluster_name | cut -d ':' -f1)" >> $GITHUB_ENV
          echo "ECS_SERVICE_NAME=$(terraform output -raw ecs_service_name | cut -d ':' -f1)" >> $GITHUB_ENV

    outputs:
      terraform_action: ${{ env.TERRAFORM_ACTION }}
      domain_name: ${{ env.DOMAIN_NAME }}
      rds_endpoint: ${{ env.RDS_ENDPOINT }}
      task_definition_name: ${{ env.ECS_TASK_DEFINITION_NAME }}
      ecs_cluster_name: ${{ env.ECS_CLUSTER_NAME }}
      ecs_service_name: ${{ env.ECS_SERVICE_NAME }}


  # Detect Changes
  detect_changes:
    name: Detect application code changes
    needs: deploy_aws_infrastructure
    if: needs.deploy_aws_infrastructure.outputs.terraform_action != 'destroy'
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Compare app repo SHA vs last built image SHA label
        id: changes
        env:
          GITHUB_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        run: |
          LATEST_APP_SHA=$(curl -sf \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ env.GITHUB_USERNAME }}/${{ env.REPOSITORY_NAME }}/commits/main" \
            | jq -r '.sha')

          if [ -z "$LATEST_APP_SHA" ] || [ "$LATEST_APP_SHA" == "null" ]; then
            echo "Could not fetch app repo SHA — forcing build to be safe"
            echo "app_changed=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Latest app commit SHA: $LATEST_APP_SHA"

          LAST_IMAGE_DIGEST=$(aws ecr describe-images \
            --repository-name "${{ env.IMAGE_NAME }}" \
            --region "${{ env.AWS_REGION }}" \
            --query 'sort_by(imageDetails, &imagePushedAt)[-1].imageDigest' \
            --output text 2>/dev/null || echo "NONE")

          if [ "$LAST_IMAGE_DIGEST" == "NONE" ] || [ -z "$LAST_IMAGE_DIGEST" ]; then
            echo "No existing ECR images — first build"
            echo "app_changed=true" >> $GITHUB_OUTPUT
            echo "app_sha=$LATEST_APP_SHA" >> $GITHUB_OUTPUT
            exit 0
          fi

          LAST_BUILT_SHA=$(aws ecr get-download-url-for-layer \
            --repository-name "${{ env.IMAGE_NAME }}" \
            --region "${{ env.AWS_REGION }}" \
            --layer-digest "$LAST_IMAGE_DIGEST" 2>/dev/null \
            || echo "NONE")
 
          LAST_BUILT_SHA=$(aws ecr describe-images \
            --repository-name "${{ env.IMAGE_NAME }}" \
            --region "${{ env.AWS_REGION }}" \
            --query 'sort_by(imageDetails, &imagePushedAt)[-1].imageTags' \
            --output json 2>/dev/null \
            | jq -r '.[] | select(startswith("sha-"))' \
            | sed 's/sha-//' \
            || echo "NONE")

          echo "Last built SHA: $LAST_BUILT_SHA"

          if [ "$LATEST_APP_SHA" == "$LAST_BUILT_SHA" ]; then
            echo "No app changes since last build — skipping"
            echo "app_changed=false" >> $GITHUB_OUTPUT
          else
            echo "New commits detected — build will run"
            echo "app_changed=true" >> $GITHUB_OUTPUT
          fi

          echo "app_sha=$LATEST_APP_SHA" >> $GITHUB_OUTPUT

    outputs:
      app_changed: ${{ steps.changes.outputs.app_changed }}
      app_sha: ${{ steps.changes.outputs.app_sha }}

  #--------------------------------------------------------------
  # JOB 2: Build, Scan, and Push Docker Image to ECR
  #--------------------------------------------------------------
  build_and_push_image:
    name: Build, scan, and push Docker image to ECR
    needs: 
      - deploy_aws_infrastructure
      - detect_changes
    if:
      needs.deploy_aws_infrastructure.outputs.terraform_action != 'destroy' && needs.detect_changes.outputs.app_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with: 
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Auto-generate next semantic version from ECR
        id: versioning
        run: |
          LATEST_TAG=$(aws ecr describe-images \
            --repository-name "${{ env.IMAGE_NAME }}" \
            --region "${{ env.AWS_REGION }}" \
            --query 'imageDetails[*].imageTags[*]' \
            --output text 2>/dev/null \
            | tr '\t' '\n' \
            | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' \
            | sort -V \
            | tail -1)

          if [ -z "$LATEST_TAG" ]; then
            NEXT_TAG="1.0.0"
            echo "No existing version tags — starting at $NEXT_TAG"
          else
            MAJOR=$(echo "$LATEST_TAG" | cut -d. -f1)
            MINOR=$(echo "$LATEST_TAG" | cut -d. -f2)
            PATCH=$(echo "$LATEST_TAG" | cut -d. -f3)
            NEXT_TAG="${MAJOR}.${MINOR}.$((PATCH + 1))"
            echo "Incrementing $LATEST_TAG → $NEXT_TAG"
          fi

          echo "IMAGE_TAG=$NEXT_TAG" >> $GITHUB_ENV
          echo "image_tag=$NEXT_TAG" >> $GITHUB_OUTPUT

      - name: Build Docker image
        working-directory: ./docker/nest-app-cicd
        env:
          DOMAIN_NAME: ${{ needs.deploy_aws_infrastructure.outputs.domain_name }}
          RDS_ENDPOINT: ${{ needs.deploy_aws_infrastructure.outputs.rds_endpoint }}
          RDS_DB_PASSWORD: ${{ secrets.RDS_DB_PASSWORD }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          APP_COMMIT_SHA: ${{ needs.detect_changes.outputs.app_sha }}
        run: bash ./build-image.sh

      - name: Scan Docker image for vulnerabilities
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          severity: CRITICAL,HIGH
          exit-code: ${{ env.ENVIRONMENT == 'prod' && '1' || '0' }}
          format: json
          output: trivy-report.json

      - name: Generate vulnerability summary
        run: |
          CRITICAL=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy-report.json)
          HIGH=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH")] | length' trivy-report.json)
          TOTAL=$((CRITICAL + HIGH))

          if [ "$TOTAL" -eq 0 ]; then
            SUMMARY="No vulnerabilities found"
          else
            SUMMARY="${TOTAL} vulnerabilities found (${CRITICAL} Critical, ${HIGH} High)"
          fi

          echo "SCAN_SUMMARY=$SUMMARY" >> $GITHUB_ENV
          echo "$SUMMARY"

      - name: Re-configure AWS Credentials before push
        uses: aws-actions/configure-aws-credentials@v6
        with: 
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Push Docker image to ECR
        working-directory: ./docker/nest-app-cicd
        env:
          APP_COMMIT_SHA: ${{ needs.detect_changes.outputs.app_sha }}
        run: bash ./push-image.sh

    outputs:
      scan_summary: ${{ env.SCAN_SUMMARY }}


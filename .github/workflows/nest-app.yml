# ============================================================
# GitHub Actions CI/CD Pipeline: Deploy Nest App to AWS ECS
# ============================================================
# This workflow automates:
#   1. Provisioning AWS infrastructure with Terraform
#   2. Building, scanning, and pushing a Docker image to ECR
#   3. Creating a new ECS task definition revision
#   4. Restarting the ECS Fargate service
#   5. Testing application health
#   6. Monitoring the deployment
#   7. Rolling back on failure
#   8. Sending Slack notifications
# ============================================================

name: Deploy Nest App to AWS ECS

# --------------------------------------------------------------
# TRIGGER: When should this workflow run?
# --------------------------------------------------------------
on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/nest-app.yml'
      - 'docker/nest-app-cicd/**'
      - 'terraform-module-ecs-cicd/nest-app/**'

# --------------------------------------------------------------
# ENVIRONMENT VARIABLES: Shared across all jobs
# --------------------------------------------------------------
env:
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
  AWS_REGION: us-east-2
  AWS_ACCOUNT_ID: "198811873315"
  TERRAFORM_ACTION: destroy
  PROJECT_NAME: nest
  ENVIRONMENT: dev
  RECORD_NAME: demo
  DOMAIN_NAME: tolaniakintayo.xyz
  GITHUB_USERNAME: tolani-akintayo
  REPOSITORY_NAME: nest-app-code
  SERVICE_PROVIDER_FILE_NAME: AppServiceProvider
  APPLICATION_CODE_FILE_NAME: nest
  RDS_DB_NAME: applicationdb
  RDS_DB_USERNAME: admin
  ECR_REPO_NAME: nest
  IMAGE_NAME: nest
  IMAGE_TAG: 1.0.1

jobs:
  #--------------------------------------------------------------
  # JOB 1: Build AWS Infrastructure
  #--------------------------------------------------------------
  deploy_aws_infrastructure:
    name: Build AWS infrastructure
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Configure SSH access for Terraform modules
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.14.6"

      - name: Run Terraform init
        working-directory: ./terraform-module-ecs-cicd/nest-app
        run: terraform init

      - name: Run Terraform plan
        working-directory: ./terraform-module-ecs-cicd/nest-app
        run: terraform plan -no-color

      - name: Run Terraform apply/destroy
        working-directory: ./terraform-module-ecs-cicd/nest-app
        run: terraform ${TERRAFORM_ACTION} --auto-approve

      - name: Export Terraform outputs
        if: env.TERRAFORM_ACTION == 'apply'
        working-directory: ./terraform-module-ecs-cicd/nest-app
        run: |
          echo "RDS_ENDPOINT=$(terraform output -raw rds_endpoint | cut -d ':' -f1)" >> $GITHUB_ENV
          echo "ECS_TASK_DEFINITION_NAME=$(terraform output -raw ecs_task_definition_name | cut -d ':' -f1)" >> $GITHUB_ENV
          echo "ECS_CLUSTER_NAME=$(terraform output -raw ecs_cluster_name | cut -d ':' -f1)" >> $GITHUB_ENV
          echo "ECS_SERVICE_NAME=$(terraform output -raw ecs_service_name | cut -d ':' -f1)" >> $GITHUB_ENV

    outputs:
      terraform_action: ${{ env.TERRAFORM_ACTION }}
      domain_name: ${{ env.DOMAIN_NAME }}
      rds_endpoint: ${{ env.RDS_ENDPOINT }}
      task_definition_name: ${{ env.ECS_TASK_DEFINITION_NAME }}
      ecs_cluster_name: ${{ env.ECS_CLUSTER_NAME }}
      ecs_service_name: ${{ env.ECS_SERVICE_NAME }}

  #--------------------------------------------------------------
  # JOB 2: Build, Scan, and Push Docker Image to ECR
  #--------------------------------------------------------------
  build_and_push_image:
    name: Build, scan, and push Docker image to ECR
    needs: deploy_aws_infrastructure
    if: needs.deploy_aws_infrastructure.outputs.terraform_action != 'destroy'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      
      # ─────────────────────────────────────────────────────────
      # Check if an image with this exact commit SHA already
      # exists in ECR. If it does, every subsequent step is
      # skipped — same code = same image, no rebuild needed.
      # ─────────────────────────────────────────────────────────
      - name: Check if image already exists in ECR
        id: check_image
        env:
          AWS_REGION: ${{ env.AWS_REGION }}
          ECR_REPO_NAME: ${{ env.ECR_REPO_NAME }}
        run: |
          # Use the git commit SHA as the unique image identifier
          COMMIT_SHA="${{ github.sha }}"
          echo "Checking ECR for image tag: $COMMIT_SHA"

          # Try to find the image in ECR — suppress errors if not found
          IMAGE_EXISTS=$(aws ecr describe-images \
            --repository-name "$ECR_REPO_NAME" \
            --region "$AWS_REGION" \
            --image-ids imageTag="$COMMIT_SHA" \
            --query 'imageDetails[0].imageTags[0]' \
            --output text 2>/dev/null || echo "NOT_FOUND")

          if [ "$IMAGE_EXISTS" != "NOT_FOUND" ] && [ "$IMAGE_EXISTS" != "None" ]; then
            echo "Image with commit SHA $COMMIT_SHA already exists in ECR — skipping build"
            echo "image_exists=true" >> $GITHUB_OUTPUT
          else
            echo "No image found for commit SHA $COMMIT_SHA — proceeding with build"
            echo "image_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Build Docker image
        # Only runs if image does NOT exist in ECR
        if: steps.check_image.outputs.image_exists == 'false'
        working-directory: ./docker/nest-app-cicd
        env:
          DOMAIN_NAME: ${{ needs.deploy_aws_infrastructure.outputs.domain_name }}
          RDS_ENDPOINT: ${{ needs.deploy_aws_infrastructure.outputs.rds_endpoint }}
          RDS_DB_PASSWORD: ${{ secrets.RDS_DB_PASSWORD }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        run: bash ./build-image.sh

      - name: Scan Docker image for vulnerabilities
        if: steps.check_image.outputs.image_exists == 'false'
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          severity: CRITICAL,HIGH
          exit-code: ${{ env.ENVIRONMENT == 'prod' && '1' || '0' }}
          format: json
          output: trivy-report.json

      - name: Generate vulnerability summary
        if: steps.check_image.outputs.image_exists == 'false'
        run: |
          CRITICAL=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy-report.json)
          HIGH=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH")] | length' trivy-report.json)
          TOTAL=$((CRITICAL + HIGH))

          if [ "$TOTAL" -eq 0 ]; then
            SUMMARY="No vulnerabilities found"
          else
            SUMMARY="${TOTAL} vulnerabilities found (${CRITICAL} Critical, ${HIGH} High)"
          fi

          echo "SCAN_SUMMARY=$SUMMARY" >> $GITHUB_ENV
          echo "$SUMMARY"

      - name: Push Docker image to ECR
        if: steps.check_image.outputs.image_exists == 'false'
        working-directory: ./docker/nest-app-cicd
        run: bash ./push-image.sh

    outputs:
      scan_summary: ${{ env.SCAN_SUMMARY }}

